<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>生コン受入試験 電子黒板</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&family=Share+Tech+Mono&display=swap');

:root {
  --green: #1a7a3e;
  --green-dark: #0f5229;
  --green-light: #2da05a;
  --gold: #c8a84b;
  --white: #f5f2e8;
  --border: #2a5c3a;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Noto Sans JP', sans-serif;
  background: #12121f;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 10px 8px 40px;
  overflow-x: hidden;
}

/* ===== TAB NAV ===== */
.tab-nav {
  display: flex;
  width: 100%;
  max-width: 640px;
  margin-bottom: 12px;
  border-bottom: 2px solid rgba(200,168,75,0.25);
}
.tab-btn {
  flex: 1;
  background: transparent;
  border: none;
  color: rgba(255,255,255,0.4);
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 13px;
  font-weight: 700;
  padding: 10px 4px;
  cursor: pointer;
  letter-spacing: 0.5px;
  border-bottom: 2px solid transparent;
  margin-bottom: -2px;
  transition: all 0.2s;
}
.tab-btn.active { color: var(--gold); border-bottom-color: var(--gold); }

.tab-panel { display: none; width: 100%; max-width: 640px; }
.tab-panel.active { display: block; }

/* ===== BLACKBOARD FORM ===== */
.blackboard {
  width: 100%;
  background: var(--green);
  border: 3px solid var(--gold);
  border-radius: 6px;
  box-shadow: 0 4px 24px rgba(0,0,0,0.4), inset 0 0 40px rgba(0,0,0,0.25);
  overflow: hidden;
  position: relative;
}
.blackboard::before {
  content: '';
  position: absolute; inset: 0;
  background:
    repeating-linear-gradient(0deg, transparent, transparent 29px, rgba(0,0,0,0.04) 30px),
    repeating-linear-gradient(90deg, transparent, transparent 29px, rgba(0,0,0,0.02) 30px);
  pointer-events: none; z-index: 0;
}
.blackboard-inner { position: relative; z-index: 1; }

.bb-table { width: 100%; border-collapse: collapse; }
.bb-table td { border: 1px solid rgba(200,168,75,0.4); padding: 0; vertical-align: middle; }

.bb-label {
  background: rgba(0,0,0,0.28);
  color: var(--gold);
  font-size: 11px;
  font-weight: 700;
  padding: 7px 8px;
  white-space: nowrap;
  letter-spacing: 0.5px;
  width: 72px;
}

.bb-input-cell { padding: 3px 6px; }

.bb-select, .bb-input {
  width: 100%;
  background: transparent;
  border: none;
  border-bottom: 1px solid rgba(200,168,75,0.45);
  color: var(--white);
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 13px;
  font-weight: 500;
  padding: 5px 2px;
  outline: none;
  caret-color: var(--gold);
  -webkit-appearance: none;
  appearance: none;
}
.bb-select { cursor: pointer; }
.bb-select:focus, .bb-input:focus { border-bottom-color: var(--gold); background: rgba(255,255,255,0.05); }
.bb-input::placeholder { color: rgba(255,255,255,0.28); font-size: 11px; }
.bb-select option { background: #1a4a2e; color: #fff; }

.bb-unit { color: rgba(255,255,255,0.55); font-size: 10.5px; padding: 0 2px 0 1px; white-space: nowrap; }
.bb-input-with-unit { display: flex; align-items: center; }

/* Results 3-col */
.results-grid { display: grid; grid-template-columns: repeat(3, 1fr); }
.result-item {
  border: 1px solid rgba(200,168,75,0.35);
  display: flex; flex-direction: column; align-items: center;
  padding: 5px 2px 6px; gap: 2px;
}
.result-item .rlabel {
  color: var(--gold); font-size: 9.5px; font-weight: 700;
  letter-spacing: 0.2px; text-align: center; line-height: 1.2;
}
.result-item .bb-input {
  width: 60px; text-align: center;
  font-size: 14px; font-weight: 700;
  border-bottom-color: rgba(200,168,75,0.35);
}
.result-item .bb-unit { font-size: 10px; }
.result-item .bb-input-with-unit { justify-content: center; }

/* Remarks */
.bb-textarea {
  width: 100%;
  background: transparent;
  border: none;
  border-top: 1px solid rgba(200,168,75,0.28);
  color: var(--white);
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 12px;
  padding: 5px 8px;
  resize: none; outline: none;
  caret-color: var(--gold);
  min-height: 34px;
  line-height: 1.6;
}
.bb-textarea::placeholder { color: rgba(255,255,255,0.25); font-size: 11px; }

/* ===== CAMERA ===== */
.camera-wrap { width: 100%; position: relative; margin-top: 12px; }

#video-container {
  width: 100%;
  aspect-ratio: 16/9;
  background: #000;
  border-radius: 4px;
  overflow: hidden;
  position: relative;
  border: 2px solid var(--border);
  touch-action: none;
}

#video { width: 100%; height: 100%; object-fit: cover; display: block; }

#overlay-bb {
  position: absolute;
  bottom: 10px; left: 10px;
  cursor: grab;
  z-index: 10;
  filter: drop-shadow(0 2px 10px rgba(0,0,0,0.85));
  touch-action: none;
  user-select: none;
  -webkit-user-select: none;
  display: none;
}
#overlay-bb:active { cursor: grabbing; }

.cam-controls {
  display: flex; gap: 8px; margin-top: 10px;
  justify-content: center; flex-wrap: wrap;
}
.overlay-size-row {
  display: flex; align-items: center; gap: 8px;
  margin-top: 8px; justify-content: flex-end;
}
.overlay-size-row label { color: rgba(255,255,255,0.4); font-size: 11px; }
.overlay-size-row input[type=range] { width: 88px; accent-color: var(--gold); }

/* Buttons */
.btn {
  font-family: 'Noto Sans JP', sans-serif;
  font-weight: 700; font-size: 13px;
  border: none; border-radius: 4px;
  padding: 11px 18px; cursor: pointer;
  display: inline-flex; align-items: center; gap: 5px;
  transition: all 0.15s;
}
.btn:active { transform: scale(0.96); }
.btn-primary { background: var(--green-light); color: #fff; }
.btn-capture { background: var(--gold); color: #111; font-size: 15px; padding: 13px 26px; }
.btn-secondary { background: rgba(255,255,255,0.1); color: var(--white); border: 1px solid rgba(255,255,255,0.15); }
.btn-sm { font-size: 11px; padding: 7px 12px; }

#canvas { display: none; }

/* Gallery */
.gallery-title {
  color: var(--gold); font-size: 12px; font-weight: 700;
  letter-spacing: 1px; margin: 16px 0 8px;
  border-bottom: 1px solid rgba(200,168,75,0.2); padding-bottom: 6px;
}
.gallery-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 8px; }
.gallery-item {
  position: relative; border-radius: 3px; overflow: hidden;
  border: 1px solid var(--border); aspect-ratio: 16/9; cursor: pointer;
}
.gallery-item img { width: 100%; height: 100%; object-fit: cover; display: block; }
.gallery-item .del-btn {
  position: absolute; top: 3px; right: 3px;
  background: rgba(160,30,30,0.85); color: #fff;
  border: none; border-radius: 50%; width: 20px; height: 20px;
  font-size: 11px; cursor: pointer; display: flex; align-items: center; justify-content: center;
}
.gallery-item .dl-btn {
  position: absolute; bottom: 3px; right: 3px;
  background: rgba(0,0,0,0.72); color: var(--gold);
  border: none; border-radius: 3px; padding: 2px 5px;
  font-size: 10px; cursor: pointer; font-family: 'Noto Sans JP', sans-serif;
}

/* Master */
.master-section { margin-bottom: 22px; }
.master-title { color: var(--gold); font-size: 12px; font-weight: 700; letter-spacing: 1px; margin-bottom: 8px; }
.master-list { display: flex; flex-direction: column; gap: 6px; margin-bottom: 8px; }
.master-item {
  display: flex; align-items: center; justify-content: space-between;
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(200,168,75,0.18);
  border-radius: 4px; padding: 8px 12px;
  color: var(--white); font-size: 13px;
}
.master-item button {
  background: rgba(160,30,30,0.7); color: #fff;
  border: none; border-radius: 3px; padding: 3px 8px;
  font-size: 11px; cursor: pointer; white-space: nowrap;
}
.master-add-row { display: flex; gap: 8px; }
.master-add-input {
  flex: 1;
  background: rgba(255,255,255,0.07);
  border: 1px solid rgba(200,168,75,0.3);
  border-radius: 4px; color: var(--white);
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 13px; padding: 8px 10px; outline: none;
  caret-color: var(--gold);
}
.master-add-input:focus { border-color: var(--gold); }
.master-add-input::placeholder { color: rgba(255,255,255,0.28); }
.section-div { border: none; border-top: 1px solid rgba(200,168,75,0.12); margin: 14px 0; }

/* Modal */
.modal {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,0.93); z-index: 1000;
  align-items: center; justify-content: center;
  padding: 16px; flex-direction: column; gap: 12px;
}
.modal.open { display: flex; }
.modal img { max-width: 100%; max-height: 75vh; border-radius: 4px; }
.modal-actions { display: flex; gap: 10px; }

/* In-video shutter button */
#btn-shutter {
  position: absolute;
  bottom: 16px; right: 16px;
  width: 64px; height: 64px;
  border-radius: 50%;
  background: var(--gold);
  border: 4px solid #fff;
  box-shadow: 0 2px 16px rgba(0,0,0,0.6);
  font-size: 28px;
  cursor: pointer;
  display: none;
  align-items: center; justify-content: center;
  z-index: 20;
  transition: transform 0.12s;
}
#btn-shutter:active { transform: scale(0.88); }

#btn-flip-overlay {
  position: absolute;
  bottom: 24px; left: 16px;
  width: 46px; height: 46px;
  border-radius: 50%;
  background: rgba(0,0,0,0.5);
  border: 2px solid rgba(255,255,255,0.4);
  font-size: 20px;
  cursor: pointer;
  display: none;
  align-items: center; justify-content: center;
  z-index: 20;
  color: #fff;
}

/* 横向き時：カメラをフルスクリーン風に */
@media (orientation: landscape) and (max-height: 500px) {
  .tab-nav { display: none !important; }
  .overlay-size-row { display: none !important; }
  .cam-controls { display: none !important; }
  #video-container {
    aspect-ratio: unset !important;
    position: fixed !important;
    inset: 0 !important;
    z-index: 50 !important;
    border-radius: 0 !important;
    border: none !important;
    width: 100vw !important;
    height: 100vh !important;
  }
  .camera-wrap { margin-top: 0; }
  body { padding: 0; }
}
</style>
</head>
<body>

<nav class="tab-nav">
  <button class="tab-btn active" data-tab="camera">📷 カメラ</button>
  <button class="tab-btn" data-tab="blackboard">📋 黒板編集</button>
  <button class="tab-btn" data-tab="master">⚙ マスター</button>
</nav>

<!-- ===== CAMERA TAB ===== -->
<div class="tab-panel active" id="tab-camera">
  <div class="camera-wrap">
    <div id="video-container">
      <video id="video" autoplay playsinline muted></video>
      <canvas id="overlay-bb"></canvas>
      <button id="btn-shutter">📸</button>
      <button id="btn-flip-overlay">🔄</button>
      <div id="no-camera" style="display:none;color:rgba(255,255,255,0.45);text-align:center;padding:40px;font-size:13px;line-height:2.2">
        📷 カメラが利用できません<br><small>ブラウザでカメラを許可してください</small>
      </div>
    </div>
    <div class="overlay-size-row">
      <label>黒板サイズ:</label>
      <input type="range" id="overlay-size" min="20" max="65" value="42">
      <label id="overlay-size-label">42%</label>
    </div>
    <div class="cam-controls">
      <button class="btn btn-secondary" id="btn-start-camera">📷 カメラ起動</button>
      <button class="btn btn-capture" id="btn-capture" disabled>⚡ 撮影</button>
      <button class="btn btn-secondary" id="btn-flip" style="display:none">🔄 切替</button>
    </div>
  </div>
  <div class="gallery-title">📁 撮影済み写真（<span id="photo-count">0</span>枚）</div>
  <div class="gallery-grid" id="gallery"></div>
</div>

<!-- ===== BLACKBOARD EDIT TAB ===== -->
<div class="tab-panel" id="tab-blackboard">
  <div class="blackboard">
    <div class="blackboard-inner">
      <table class="bb-table">
        <tr>
          <td class="bb-label">工 事 名</td>
          <td class="bb-input-cell">
            <select class="bb-select" id="f-koujimei"><option value="">── 選択 ──</option></select>
          </td>
        </tr>
        <tr>
          <td class="bb-label">打設箇所</td>
          <td class="bb-input-cell">
            <select class="bb-select" id="f-kakou"><option value="">── 選択 ──</option></select>
          </td>
        </tr>
        <tr>
          <td class="bb-label">配　　合</td>
          <td class="bb-input-cell">
            <select class="bb-select" id="f-haigo"><option value="">── 選択 ──</option></select>
          </td>
        </tr>
        <tr>
          <td class="bb-label">試 験 日</td>
          <td class="bb-input-cell">
            <input class="bb-input" id="f-date" type="date">
          </td>
        </tr>
      </table>

      <div class="results-grid">
        <div class="result-item">
          <div class="rlabel">スランプ</div>
          <div class="bb-input-with-unit">
            <input class="bb-input" id="r-slump" placeholder="0.0" inputmode="decimal">
            <span class="bb-unit">cm</span>
          </div>
        </div>
        <div class="result-item">
          <div class="rlabel">空 気 量</div>
          <div class="bb-input-with-unit">
            <input class="bb-input" id="r-kuuki" placeholder="0.0" inputmode="decimal">
            <span class="bb-unit">%</span>
          </div>
        </div>
        <div class="result-item">
          <div class="rlabel">塩 化 物</div>
          <div class="bb-input-with-unit">
            <input class="bb-input" id="r-ensika" placeholder="0.000" inputmode="decimal" style="width:50px;font-size:12px">
            <span class="bb-unit">kg/m³</span>
          </div>
        </div>
        <div class="result-item">
          <div class="rlabel">外 気 温</div>
          <div class="bb-input-with-unit">
            <input class="bb-input" id="r-gaikion" placeholder="0.0" inputmode="decimal">
            <span class="bb-unit">°C</span>
          </div>
        </div>
        <div class="result-item">
          <div class="rlabel">ｺﾝｸﾘｰﾄ温度</div>
          <div class="bb-input-with-unit">
            <input class="bb-input" id="r-con-temp" placeholder="0.0" inputmode="decimal">
            <span class="bb-unit">°C</span>
          </div>
        </div>
        <div class="result-item">
          <div class="rlabel">立 会 人</div>
          <div class="bb-input-with-unit">
            <input class="bb-input" id="r-tachiai" placeholder="氏名" style="width:56px;font-size:12px">
            <span class="bb-unit">氏</span>
          </div>
        </div>
      </div>

      <textarea class="bb-textarea" id="f-biko" rows="2" placeholder="備考（単位水量・テストピース採取数 など）"></textarea>
    </div>
  </div>
</div>

<!-- ===== MASTER TAB ===== -->
<div class="tab-panel" id="tab-master">
  <div class="master-section">
    <div class="master-title">🏗 工事名</div>
    <div class="master-list" id="list-koujimei"></div>
    <div class="master-add-row">
      <input class="master-add-input" id="add-koujimei" placeholder="工事名を入力">
      <button class="btn btn-primary btn-sm" onclick="addMaster('koujimei')">＋ 追加</button>
    </div>
  </div>
  <hr class="section-div">
  <div class="master-section">
    <div class="master-title">📍 打設箇所</div>
    <div class="master-list" id="list-kakou"></div>
    <div class="master-add-row">
      <input class="master-add-input" id="add-kakou" placeholder="打設箇所を入力">
      <button class="btn btn-primary btn-sm" onclick="addMaster('kakou')">＋ 追加</button>
    </div>
  </div>
  <hr class="section-div">
  <div class="master-section">
    <div class="master-title">⚗ 配合</div>
    <div class="master-list" id="list-haigo"></div>
    <div class="master-add-row">
      <input class="master-add-input" id="add-haigo" placeholder="配合番号を入力">
      <button class="btn btn-primary btn-sm" onclick="addMaster('haigo')">＋ 追加</button>
    </div>
  </div>
</div>

<canvas id="canvas"></canvas>

<div class="modal" id="modal">
  <img id="modal-img" src="" alt="">
  <div class="modal-actions">
    <button class="btn btn-primary" id="modal-dl">⬇ 保存</button>
    <button class="btn btn-secondary" id="modal-close">✕ 閉じる</button>
  </div>
</div>

<script>
// ===== MASTER DATA =====
const MASTER_KEYS = ['koujimei','kakou','haigo'];

function loadMaster(key) {
  try { return JSON.parse(localStorage.getItem('master_'+key)||'[]'); } catch(e) { return []; }
}
function saveMaster(key, arr) { localStorage.setItem('master_'+key, JSON.stringify(arr)); }

function renderMasterList(key) {
  const arr = loadMaster(key);
  const list = document.getElementById('list-'+key);
  list.innerHTML = arr.length === 0
    ? '<div style="color:rgba(255,255,255,0.28);font-size:12px;padding:4px 0">まだ登録がありません</div>'
    : '';
  arr.forEach((item, i) => {
    const div = document.createElement('div');
    div.className = 'master-item';
    div.innerHTML = `<span>${item}</span><button onclick="deleteMaster('${key}',${i})">削除</button>`;
    list.appendChild(div);
  });
  refreshSelect(key);
}

function addMaster(key) {
  const input = document.getElementById('add-'+key);
  const v = input.value.trim();
  if (!v) return;
  const arr = loadMaster(key);
  if (!arr.includes(v)) { arr.push(v); saveMaster(key, arr); }
  input.value = '';
  renderMasterList(key);
}

function deleteMaster(key, idx) {
  const arr = loadMaster(key);
  arr.splice(idx, 1);
  saveMaster(key, arr);
  renderMasterList(key);
}

function refreshSelect(key) {
  const arr = loadMaster(key);
  const selId = {koujimei:'f-koujimei', kakou:'f-kakou', haigo:'f-haigo'}[key];
  const sel = document.getElementById(selId);
  const cur = sel.value;
  sel.innerHTML = '<option value="">── 選択 ──</option>';
  arr.forEach(item => {
    const o = document.createElement('option');
    o.value = item; o.textContent = item;
    sel.appendChild(o);
  });
  if (arr.includes(cur)) sel.value = cur;
}

MASTER_KEYS.forEach(key => {
  document.getElementById('add-'+key).addEventListener('keydown', e => { if(e.key==='Enter') addMaster(key); });
});
MASTER_KEYS.forEach(renderMasterList);

// ===== TABS =====
document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('tab-'+btn.dataset.tab).classList.add('active');
    // カメラタブ以外ではオーバーレイループを止め、横向きロック解除
    if(btn.dataset.tab !== 'camera') {
      if(animFrame) { cancelAnimationFrame(animFrame); animFrame=null; }
      unlockOrientation();
    } else {
      // カメラタブに戻ったらループ再開＋横向きロック
      if(stream) { startOverlayLoop(); lockLandscape(); }
    }
  });
});

// ===== DATE DEFAULT =====
document.getElementById('f-date').value = new Date().toISOString().slice(0,10);

// ===== DRAW BLACKBOARD =====
function getVal(id) { const el=document.getElementById(id); return el ? el.value||'' : ''; }

function drawBlackboard(cvs) {
  const W = 500, H = 255;
  cvs.width = W; cvs.height = H;
  const ctx = cvs.getContext('2d');

  // BG + texture
  ctx.fillStyle = '#1a7a3e'; ctx.fillRect(0,0,W,H);
  for(let y=0;y<H;y+=30){
    ctx.strokeStyle='rgba(0,0,0,0.04)'; ctx.lineWidth=1;
    ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(W,y); ctx.stroke();
  }
  // border
  ctx.strokeStyle='#c8a84b'; ctx.lineWidth=3;
  ctx.strokeRect(1.5,1.5,W-3,H-3);

  const LW=70, rowH=26;
  function bdr(x,y,w,h){ ctx.strokeStyle='rgba(200,168,75,0.4)'; ctx.lineWidth=1; ctx.strokeRect(x,y,w,h); }
  function lbg(x,y,w,h){ ctx.fillStyle='rgba(0,0,0,0.28)'; ctx.fillRect(x,y,w,h); }
  function gold(t,x,y,sz=10){ ctx.fillStyle='#c8a84b'; ctx.font=`bold ${sz}px "Noto Sans JP",sans-serif`; ctx.textAlign='left'; ctx.fillText(t,x,y); }
  function white(t,x,y,sz=11,al='left'){ ctx.fillStyle='#f5f2e8'; ctx.font=`${sz}px "Noto Sans JP",sans-serif`; ctx.textAlign=al; ctx.fillText(t,x,y); }
  function bwhite(t,x,y,sz=12,al='center'){ ctx.fillStyle='#f5f2e8'; ctx.font=`bold ${sz}px "Noto Sans JP",sans-serif`; ctx.textAlign=al; ctx.fillText(t,x,y); }

  // Info rows
  const infoRows = [
    ['工 事 名', getVal('f-koujimei')],
    ['打設箇所', getVal('f-kakou')],
    ['配　　合', getVal('f-haigo')],
    ['試 験 日', (()=>{ const d=getVal('f-date'); return d?d.replace(/-/g,'/'):''; })()],
  ];
  infoRows.forEach(([lbl,v],i)=>{
    const y=3+i*rowH;
    bdr(3,y,W-6,rowH); lbg(3,y,LW,rowH);
    gold(lbl, 7, y+rowH/2+4);
    white(v.substring(0,26), LW+6, y+rowH/2+4, 11);
  });

  // Results 3-col
  const resY = 3 + infoRows.length*rowH;
  const colW = (W-6)/3;
  const resH = 34;
  const results = [
    ['スランプ',   getVal('r-slump'),    'cm'],
    ['空 気 量',   getVal('r-kuuki'),    '%'],
    ['塩 化 物',   getVal('r-ensika'),   'kg/m³'],
    ['外 気 温',   getVal('r-gaikion'),  '°C'],
    ['ｺﾝｸﾘｰﾄ温度', getVal('r-con-temp'), '°C'],
    ['立 会 人',   getVal('r-tachiai'),  '氏'],
  ];
  results.forEach(([lbl,v,unit],i)=>{
    const col=i%3, row2=Math.floor(i/3);
    const x=3+col*colW, y=resY+row2*resH;
    bdr(x,y,colW,resH); lbg(x,y,colW,13);
    ctx.fillStyle='#c8a84b'; ctx.font='bold 9px "Noto Sans JP",sans-serif'; ctx.textAlign='center';
    ctx.fillText(lbl, x+colW/2, y+11);
    const vs = v ? v+' '+unit : '—';
    bwhite(vs, x+colW/2, y+resH-7, 12, 'center');
  });

  // Biko
  const bikoY = resY+2*resH;
  const bikoH = H-bikoY-3;
  bdr(3,bikoY,W-6,bikoH); lbg(3,bikoY,LW,bikoH);
  gold('備　考', 7, bikoY+bikoH/2+4);
  const bikoLines = getVal('f-biko').split('\n').slice(0,2);
  bikoLines.forEach((line,li)=> white(line.substring(0,30), LW+6, bikoY+13+li*13, 10));
}

// ===== CAMERA =====
let stream=null, facingMode='environment', overlayRatio=0.42, animFrame=null, photos=[];
let isDragging=false, dragOffX=0, dragOffY=0, bbLeft=null, bbTop=null;

const video=document.getElementById('video');
const overlayBB=document.getElementById('overlay-bb');
const mainCanvas=document.getElementById('canvas');
const btnCapture=document.getElementById('btn-capture');
const btnFlip=document.getElementById('btn-flip');
const btnShutter=document.getElementById('btn-shutter');
const btnFlipOverlay=document.getElementById('btn-flip-overlay');
const noCameraMsg=document.getElementById('no-camera');
const videoContainer=document.getElementById('video-container');

// 横向きロック
function lockLandscape() {
  if(screen.orientation && screen.orientation.lock) {
    screen.orientation.lock('landscape').catch(()=>{});
  }
}
function unlockOrientation() {
  if(screen.orientation && screen.orientation.unlock) {
    screen.orientation.unlock();
  }
}

async function startCamera() {
  if(stream) stream.getTracks().forEach(t=>t.stop());
  try {
    // 横向き優先で要求
    stream = await navigator.mediaDevices.getUserMedia({
      video:{ facingMode, width:{ideal:1920}, height:{ideal:1080} }, audio:false
    });
    video.srcObject=stream;
    video.style.display='block';
    noCameraMsg.style.display='none';
    btnCapture.disabled=false;
    btnFlip.style.display='inline-flex';
    // オーバーレイ内ボタンを表示
    btnShutter.style.display='flex';
    btnFlipOverlay.style.display='flex';
    overlayBB.style.display='block';
    bbLeft=null; bbTop=null;
    lockLandscape();
    startOverlayLoop();
  } catch(e) {
    video.style.display='none';
    noCameraMsg.style.display='flex';
    overlayBB.style.display='none';
    alert('カメラを起動できませんでした。ブラウザの設定を確認してください。');
  }
}

function applyOverlayPos() {
  const vcW=videoContainer.offsetWidth;
  const vcH=videoContainer.offsetHeight;
  const bbW=Math.round(vcW*overlayRatio);
  overlayBB.style.width=bbW+'px';
  overlayBB.style.height='auto';

  if(bbLeft===null) {
    // default: left-bottom
    overlayBB.style.left='10px';
    overlayBB.style.bottom='10px';
    overlayBB.style.top='auto';
    overlayBB.style.right='auto';
  } else {
    const bbH=overlayBB.offsetHeight||Math.round(bbW*(255/500));
    const cl=Math.max(4, Math.min(bbLeft, vcW-bbW-4));
    const ct=Math.max(4, Math.min(bbTop,  vcH-bbH-4));
    overlayBB.style.left=cl+'px';
    overlayBB.style.top=ct+'px';
    overlayBB.style.bottom='auto';
    overlayBB.style.right='auto';
  }
}

function startOverlayLoop() {
  if(animFrame) cancelAnimationFrame(animFrame);
  function loop() {
    applyOverlayPos();
    drawBlackboard(overlayBB);
    animFrame=requestAnimationFrame(loop);
  }
  loop();
}

// Drag (pointer events — touch + mouse)
overlayBB.addEventListener('pointerdown', e=>{
  e.preventDefault(); isDragging=true;
  overlayBB.setPointerCapture(e.pointerId);
  const r=overlayBB.getBoundingClientRect();
  dragOffX=e.clientX-r.left; dragOffY=e.clientY-r.top;
});
overlayBB.addEventListener('pointermove', e=>{
  if(!isDragging) return; e.preventDefault();
  const vcR=videoContainer.getBoundingClientRect();
  bbLeft=e.clientX-vcR.left-dragOffX;
  bbTop =e.clientY-vcR.top -dragOffY;
  applyOverlayPos();
});
overlayBB.addEventListener('pointerup',    ()=>{ isDragging=false; });
overlayBB.addEventListener('pointercancel',()=>{ isDragging=false; });

document.getElementById('btn-start-camera').addEventListener('click', startCamera);
btnFlip.addEventListener('click', ()=>{ facingMode=facingMode==='environment'?'user':'environment'; startCamera(); });
btnFlipOverlay.addEventListener('click', ()=>{ facingMode=facingMode==='environment'?'user':'environment'; startCamera(); });

// シャッターボタン（ビデオ内）は撮影ボタンと同じ動作
btnShutter.addEventListener('click', ()=>{ btnCapture.click(); });

document.getElementById('overlay-size').addEventListener('input', function(){
  overlayRatio=parseInt(this.value)/100;
  document.getElementById('overlay-size-label').textContent=this.value+'%';
});

// ===== CAPTURE =====
btnCapture.addEventListener('click', ()=>{
  if(!stream) return;

  let vw=video.videoWidth||1280, vh=video.videoHeight||720;

  // Androidは横向きでも縦長のvideoWidth/Heightを返す場合がある
  // videoのCSS表示が横長なのに内部が縦長なら回転して補正
  const vcR=videoContainer.getBoundingClientRect();
  const displayIsLandscape = vcR.width > vcR.height;
  const videoIsPortrait = vw < vh;
  const needsRotation = displayIsLandscape && videoIsPortrait;

  if(needsRotation) {
    // canvasを横長に設定し、90度回転して描画
    mainCanvas.width=vh; mainCanvas.height=vw;
    const ctx=mainCanvas.getContext('2d');
    ctx.translate(vh/2, vw/2);
    ctx.rotate(Math.PI/2);
    ctx.drawImage(video, -vw/2, -vh/2, vw, vh);
    // 回転後の実寸に合わせる
    vw=mainCanvas.width; vh=mainCanvas.height;

    // 黒板オーバーレイ位置（回転後座標系）
    const bbR=overlayBB.getBoundingClientRect();
    const scX=vw/vcR.width, scY=vh/vcR.height;
    const bx=(bbR.left-vcR.left)*scX;
    const by=(bbR.top-vcR.top)*scY;
    const bw=bbR.width*scX;
    const bh=bbR.height*scY;
    ctx.setTransform(1,0,0,1,0,0); // リセット
    const bbC=document.createElement('canvas');
    drawBlackboard(bbC);
    ctx.drawImage(bbC,bx,by,bw,bh);
  } else {
    mainCanvas.width=vw; mainCanvas.height=vh;
    const ctx=mainCanvas.getContext('2d');
    ctx.drawImage(video,0,0,vw,vh);

    const bbR=overlayBB.getBoundingClientRect();
    const scX=vw/vcR.width, scY=vh/vcR.height;
    const bx=(bbR.left-vcR.left)*scX;
    const by=(bbR.top-vcR.top)*scY;
    const bw=bbR.width*scX;
    const bh=bbR.height*scY;
    const bbC=document.createElement('canvas');
    drawBlackboard(bbC);
    ctx.drawImage(bbC,bx,by,bw,bh);
  }

  const dataURL=mainCanvas.toDataURL('image/jpeg',0.93);
  const now=new Date(), pad=n=>String(n).padStart(2,'0');
  const filename=`concrete_${now.getFullYear()}${pad(now.getMonth()+1)}${pad(now.getDate())}_${pad(now.getHours())}${pad(now.getMinutes())}${pad(now.getSeconds())}.jpg`;
  photos.push({dataURL, filename});
  renderGallery();

  // Flash
  const flash=document.createElement('div');
  flash.style.cssText='position:fixed;inset:0;background:white;opacity:0.85;z-index:999;pointer-events:none;transition:opacity 0.25s';
  document.body.appendChild(flash);
  setTimeout(()=>{ flash.style.opacity='0'; setTimeout(()=>flash.remove(),280); },40);
});

// ===== GALLERY =====
function renderGallery() {
  const g=document.getElementById('gallery');
  document.getElementById('photo-count').textContent=photos.length;
  g.innerHTML='';
  photos.forEach((p,i)=>{
    const item=document.createElement('div');
    item.className='gallery-item';
    item.innerHTML=`<img src="${p.dataURL}" alt="photo ${i+1}"><button class="del-btn">✕</button><button class="dl-btn">↓保存</button>`;
    item.querySelector('img').addEventListener('click',()=>openModal(p));
    item.querySelector('.del-btn').addEventListener('click',e=>{ e.stopPropagation(); photos.splice(i,1); renderGallery(); });
    item.querySelector('.dl-btn').addEventListener('click',e=>{ e.stopPropagation(); dlPhoto(p); });
    g.appendChild(item);
  });
}

function dlPhoto(p) {
  const a=document.createElement('a'); a.href=p.dataURL; a.download=p.filename; a.click();
}
function openModal(p) {
  document.getElementById('modal-img').src=p.dataURL;
  document.getElementById('modal').classList.add('open');
  document.getElementById('modal-dl').onclick=()=>dlPhoto(p);
}
document.getElementById('modal-close').addEventListener('click',()=>document.getElementById('modal').classList.remove('open'));
document.getElementById('modal').addEventListener('click',function(e){ if(e.target===this) this.classList.remove('open'); });

renderGallery();
</script>
